<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tabla de multiplicar</h1>
    
    <p></p>
    <script>

        
            let numero = document.querySelector("#numero").value;
            
            let tabla = "";
            for (let i = 1; i <= 10; i++) {
                tabla += `${numero} x ${i} = ${numero * i}\n`;
                                     
               
            }
             console.log(tabla);



        
    </script>
</body>
</html>
