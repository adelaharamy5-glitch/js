<body>
    
    <script>
         
        
         let arr=[2,5,7,15,-5,-100,55];
         
         let min=arr[0];
         let max=arr[0];
         Determinar(arr,max,min);


        function Determinar(array,maximo,minimo){
            for(let j=0; j<=array.length-1;j++){
           
                if(array[j]>maximo){
                    maximo = array[j];
                    
                }
                if(array[j]<minimo){
                        minimo = array[j];
                }
            }

            

            console.log(`El Mayor es: ${maximo}`);
            console.log(`El Menor es: ${minimo}`);
        }
    </script>
