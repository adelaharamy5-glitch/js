<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p></p>
    <script>
          let arbol=5;
        for (let i=0;i<arbol;i++){
            document.querySelector("p").innerHTML+= ('&nbsp;'.repeat(arbol-i));
            document.querySelector("p").innerHTML+=('*'.repeat(i));
            document.querySelector("p").innerHTML+="<br>";



        }
         document.querySelector("p").innerHTML+="&nbsp;".repeat(arbol-1);
        document.querySelector("p").innerHTML+=" || ".repeat(1);
    </script>
</body>
</html>
