<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Sistema para Calcular el factorial</h1>
    <label>Ingrese un numero</label>
    <input type="text" id="numero">
    <button onclick="Factorial()">Enviar</button>
    <p></p>
    <script>

        function Factorial(){

            let input = document.querySelector("#numero");
            let numero = parseInt(input.value);

            document.querySelector("p").innerHTML=numero;

            for(let i=1; i<=numero ; i++){
                document.querySelector("p").innerHTML+=` x  ${numero-i}`; 

            }

        }

    </script>
</body>
</html>
