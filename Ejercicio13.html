<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Botonos para Incrementar y Decrementar</h1>

    <button type="button" onclick="Incrementar()">Incrementar</button>
    <button type="button" onclick="Decrementar()">Decrementar</button>
    <p></p>
    <script>

        let contador=0;

        function Incrementar(){

            contador++;
            document.querySelector("p").innerHTML=contador;
        }


        function Decrementar(){
            contador--;
            document.querySelector("p").innerHTML=contador;
        }
        
        document.querySelector("p").innerHTML=contador;
    </script>
</body>
</html>
